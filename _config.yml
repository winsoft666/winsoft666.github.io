title: winsoft666
description: Keep Simple
show_downloads: false
google_analytics:
theme: jekyll-theme-cayman

cdn:
    jsdelivr:
        enabled: true

components:
    # 分享
    share:
        enabled: false
    # 不蒜子访问统计
    busuanzi:
        enabled: true
        start_date: 2020-05-03
    # My Popular Repositories
    side_bar_repo:
        enabled: true
        limit: 5
    # 文章字数统计
    word_count:
        enabled: true

compress_html:
  clippings: all
  comments: ["<!--", "-->"]
  
# 代码高亮风格，支持的 theme 列表见 https://github.com/mzlogin/rouge-themes
highlight_theme: github

